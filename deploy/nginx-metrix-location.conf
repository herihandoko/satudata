# Snippet: paste into server { } in /etc/nginx/sites-available/ckan
# BEFORE location / { ... }
#
# Metabase reverse proxy — same-origin embed for /metrix (signed JWT or public).
# IMPORTANT: use Host $host (not Metabase internal IP) so Metabase generates
# correct asset/API URLs for the public site.

location /metrix-dashboard/ {
    proxy_pass http://10.255.100.65:3000/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;
    proxy_buffering off;
}
