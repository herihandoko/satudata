# VM host nginx — CKAN + Metabase proxy (development & production layout)
# Install: sudo cp deploy/nginx-ckan-vm.conf /etc/nginx/sites-available/ckan
#          sudo ln -sf /etc/nginx/sites-available/ckan /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# TLS terminates at upstream openresty; this file typically serves HTTP :80 only.

proxy_temp_path /tmp/nginx_proxy 1 2;

server {
    server_name data.bantenprov.go.id satudata.bantendev.id;
    client_max_body_size 100M;

    location /metrix-dashboard/ {
        proxy_pass http://10.255.100.65:3000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;
    }

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
